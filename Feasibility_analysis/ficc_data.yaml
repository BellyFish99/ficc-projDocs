  - {cn: 量化研究员, en: "Quant Researcher", p1_hc: 6, p2_hc: 8, p3_hc: 4, desc: "定价模型、风险计量、因子模型，Python/C++"}
  - {cn: 前端研发工程师, en: "Frontend Engineer", p1_hc: 4, p2_hc: 6, p3_hc: 3, desc: "交易终端UI，React/Vue，实时数据展示"}
