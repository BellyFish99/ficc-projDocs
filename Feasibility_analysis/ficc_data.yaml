    functions:
      - {id: F03-01, name: 正/逆回购全周期, desc: "协议回购（GC/质押式）发起、续做、到期，双方确认闭环", complexity: 高, days: 30, priority: P1}
      - {id: F03-02, name: 质押品篮子管理, desc: "多类质押品估值与折扣率，支持替换与追加保证金（Margin Call）", complexity: 高, days: 25, priority: P1}
      - {id: F03-03, name: 资金头寸监控, desc: 日内融资头寸实时监控，资金缺口预警，与IBOR现金流对接, complexity: 中, days: 20, priority: P1}
      - {id: F03-04, name: 到期自动提醒, desc: 到期前T-1/T-3提醒，支持批量续作规则配置, complexity: 低, days: 10, priority: P1}
