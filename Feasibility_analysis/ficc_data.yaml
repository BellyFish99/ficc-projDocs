  - "no": 7
    cn: 组合管理+绩效归因
    en: Portfolio Mgmt & Perf
    domain: 前台投资管理
    priority: P1
    market_demand: 5
    competitor_strength: 3
    current_state: L2
    target_state: L4
    gap: 中
