modules:
  - "no": 1
    cn: IBOR投资账薄管理
    en: IBOR
    domain: 前/中台基础设施
    priority: P1
    market_demand: 5
    competitor_strength: 3
    current_state: L2
    target_state: L4
    gap: 中
    competitor: 衡泰(老旧)
    foundation: AMI/AMDB账户体系
    duration_m: 12
    team_sz: 14
    person_months: 130
    note: "整个FICC平台的账薄主干，27项功能覆盖持仓/现金/估值/事件/对账/合规/试算全链路"
    source_slide: ~
    data_inputs: [交易指令数据, 行情/估值数据, 资产主数据, 托管行结算通知]
    foundation_layer: [账户体系(AMI/AMDB), Kafka实时消息, Redis分布式缓存]
    tech_design:
      pattern: 第三代实时提取IBOR — 事件驱动架构(EDA)，按需即时生成头寸视图，不使用清除填充或滚动余额模式
      data_model:
        - "Transaction层: 原始交易/非交易事件全量流水，含完整状态机"
        - "Trade层: 成交簿记与Trade enrichment（子账户/策略/指令信息补充）"
        - "Position层: 实时头寸计算、成本核算、多时态快照存储"
        - "Asset层: 估值定价、风险指标加工、会计分类标注"
      core_stack:
        realtime_engine: "Kafka(事件总线) + 自研PHX计算引擎(事件驱动实时计算)"
        position_store: "Redis Cluster(日内实时缓存，<1ms读写) + TiDB/OceanBase(历史时序，5年快照)"
        batch_engine: "Airflow(日终调度) + Spark(批量全量估值)"
        api_layer: "REST/gRPC(同步查询) + Kafka Topic(异步推送给下游系统)"
        infra: "双活部署，核心服务99.99% SLA；信创适配RocketMQ/GaussDB可替换"
      key_interfaces:
        inbound:
          - "OMS/ATP → 成交回报(Kafka实时，<200ms)"
          - "AMD/Bloomberg → 行情估值(Kafka实时，<1s)"
          - "中登/中债登 → 日终持仓(SFTP批量，T+0 EOD)"
          - "资金系统 → 现金划拨(REST实时)"
        outbound:
          - "IBOR → 风险计量平台(Kafka推送，持仓+估值变化事件)"
          - "IBOR → 组合管理系统(REST查询API + Kafka实时订阅)"
          - "IBOR → 事前风控/合规(REST同步，交易前合规检查)"
          - "IBOR → 报表引擎/监管报送(REST批量拉取)"
      key_decisions:
        - "双态部署: 生产态(实时)与模拟态(What-if沙箱)数据隔离，模拟态与生产态T-0同步"
        - "估值算法可插拔: FVTPL/FVOCI/AMC通过配置切换，粒度支持个券维度，算法热加载不重启"
        - "信创优先: 消息队列优先RocketMQ，数据库优先OceanBase/GaussDB，Kafka/TiDB作备选"
        - "多时态头寸: 以Event Sourcing方式存储全量事件，任意时间点头寸按需重建，无需预存快照"
      open_questions:
        - "与现有ABOR会计系统的接口协议待确认（文件/API/CDC）"
        - "信创环境下RocketMQ替代Kafka的性能基准测试待完成"
        - "What-if模拟态与生产态的数据同步延迟SLA待与业务方对齐"
    function_domains:
      - id: A
        name: 实时持仓管理
        functions:
          - {id: F01-01, name: 跨资产实时头寸, desc: "债券/回购/利率衍生品全品种T0实时持仓，含未交割与待交割敞口分层展示", complexity: 高, days: 40, priority: P1, acceptance: "持仓更新延迟<500ms，全品种覆盖率100%", dependency: "交易系统OMS/ATP报盘接口"}
          - {id: F01-02, name: 多账户层级汇总, desc: "基金/策略/组合/公司四级持仓合并与分拆，支持跨基金同标的穿透聚合", complexity: 中, days: 20, priority: P1, acceptance: "层级汇总数据与单账户加总误差为零", dependency: "AMI/AMDB账户主数据"}
          - {id: F01-03, name: 账薄T0/T1切换, desc: "交易日账薄（含未交割）与结算账薄（T+1已交割）自动切换，切换耗时<1min", complexity: 中, days: 20, priority: P1, acceptance: "T0/T1持仓差=未交割敞口，自动核验通过率>99%", dependency: "中登/中债登结算接口"}
          - {id: F01-04, name: 可用券与冻结管理, desc: "质押券/司法冻结券/回购占用券从可用头寸自动剔除，前台实时可用量查询", complexity: 中, days: 15, priority: P1, acceptance: "可用量计算误差为零，冻结事件<30s生效", dependency: "回购管理系统/风控系统"}
          - {id: F01-27, name: 资产打标与组合树管理, desc: "多维度资产标签体系（评级/行业/策略/流动性层级/会计分类）灵活配置，支持自定义组合树构建多分析视角；标签驱动持仓穿透聚合和报表分组", complexity: 中, days: 20, priority: P2, acceptance: "标签体系支持≥10维度，组合树层级≥4级，标签变更<1min生效影响所有聚合视图", dependency: "资产主数据/IBOR持仓引擎/报表系统"}
      - id: B
        name: 现金管理
        functions:
          - {id: F01-05, name: 实时现金余额, desc: "多账户已结算/未结算现金实时汇总，T0资金头寸含日间资金划拨记录", complexity: 高, days: 25, priority: P1, acceptance: "现金余额与银行回单误差为零，日中更新频率≥每分钟", dependency: "资金系统/清算结算接口"}
          - {id: F01-06, name: 现金流预测, desc: "回购到期/票息支付/衍生品结算现金流7-30日滚动预测，流动性缺口预警", complexity: 高, days: 30, priority: P1, acceptance: "7日现金流预测准确率>95%，流动性预警提前24h触发", dependency: "回购管理/利率衍生品/IBOR持仓"}
          - {id: F01-07, name: 多币种资金管理, desc: "CNY/USD/HKD等多币种现金分账户轧差，FX即期换算折算人民币净敞口", complexity: 中, days: 20, priority: P2, acceptance: "多币种折算汇率误差<0.01%，轧差结果实时刷新", dependency: "外汇系统/AMD行情平台"}
      - id: C
        name: 估值与净值
        functions:
          - {id: F01-08, name: 实时市值计算, desc: "接入AMD/Bloomberg/Wind估值价格，全持仓实时MtM与日内PnL计算，支持估值价格覆盖", complexity: 高, days: 35, priority: P1, acceptance: "MtM更新延迟<1s，估值覆盖审批留痕100%", dependency: "AMD行情平台/Bloomberg数据接口"}
          - {id: F01-09, name: 应计利息计算, desc: "债券应计利息按实际/365、实际/360、30/360多计息基准精确计算，日终净值自动生成", complexity: 中, days: 20, priority: P1, acceptance: "应计利息与Bloomberg基准误差<0.01元/百元面值", dependency: "资产主数据（票面率/计息基准/付息频率）"}
          - {id: F01-10, name: 衍生品逐日盯市, desc: "IRS/CDS/国债期货逐日MtM计算，保证金余额实时更新，追加保证金（Margin Call）自动触发", complexity: 高, days: 30, priority: P1, acceptance: "衍生品MtM与对手方差异<0.5bps，Margin Call触发延迟<5min", dependency: "量化定价引擎/交易对手管理"}
      - id: D
        name: 事件处理
        functions:
          - {id: F01-11, name: 付息与到期处理, desc: "债券票息自动计算并入账，到期本金偿还自动处理，含权债（可赎回/可回售）行权事件提醒与执行", complexity: 高, days: 30, priority: P1, acceptance: "付息/到期处理T+0完成，含权债提前5交易日发起行权提示", dependency: "资产主数据/托管行结算通知"}
          - {id: F01-12, name: 回购滚动管理, desc: "质押式/买断式回购到期自动识别，支持一键续作指令生成，回购占用券随生命周期自动更新", complexity: 高, days: 25, priority: P1, acceptance: "到期回购提前1日预警，续作指令生成成功率>99%", dependency: "回购管理系统/IBOR头寸"}
          - {id: F01-13, name: 公司行为通知, desc: "债券评级变动/提前偿还/强制赎回等公司行为实时推送，影响持仓自动标注，处理决策记录留痕", complexity: 中, days: 20, priority: P2, acceptance: "公司行为推送延迟<30min，影响持仓标注覆盖率100%", dependency: "AMD行情平台/资产主数据"}
      - id: E
        name: 对账与数据质量
        functions:
          - {id: F01-14, name: 托管行持仓对账, desc: "与中登（交易所债券）、中债登（银行间债券）日终持仓对账，差异自动分类（未交割/错误/缺漏）并推送告警", complexity: 高, days: 30, priority: P1, acceptance: "日终对账完成时间<8:00AM，差异识别率100%，自动匹配率>95%", dependency: "中登/中债登结算接口/SFTP"}
          - {id: F01-15, name: IBOR-ABOR差异对比, desc: "投资账薄（实时）与会计账薄（已结算）差异对比，差异原因自动分类（未结算/估值差/计提差），供中台复核", complexity: 中, days: 20, priority: P1, acceptance: "IBOR-ABOR差异原因分类准确率>98%，日终净值差=0（已结算口径）", dependency: "会计核算系统(ABOR)/IBOR持仓"}
          - {id: F01-16, name: 交割失败追踪, desc: "未交割记录全生命周期管理，T+N逾期告警，补交割流程触发，交割失败率统计分析", complexity: 中, days: 15, priority: P1, acceptance: "交割失败识别延迟<1h，补交割触发成功率>95%", dependency: "清算结算系统/中登中债登"}
      - id: F
        name: 合规与监管
        functions:
          - {id: F01-17, name: 实时合规检查, desc: "投资授权范围/单券集中度/久期限额/评级限额实时监控，违规自动告警并阻断交易指令", complexity: 高, days: 25, priority: P1, acceptance: "合规检查响应<200ms，零漏报，误报率<0.1%", dependency: "事前风控/合规系统/投资授权书管理"}
          - {id: F01-18, name: 监管报送数据支持, desc: "按人民银行/证监会/银保监会格式提取持仓/交易/资金数据，支持报表模板配置与定时推送", complexity: 中, days: 20, priority: P1, acceptance: "报送数据与IBOR源数据一致性100%，定时推送准时率>99.9%", dependency: "IBOR全域数据/报表引擎"}
      - id: G
        name: 数据接入与集成
        functions:
          - {id: F01-19, name: 行情数据接入, desc: "接入AMD/Bloomberg/Wind实时行情（中债估值/利率曲线/信用利差/波动率曲面），标准化清洗后推送至IBOR定价层", complexity: 高, days: 25, priority: P1, acceptance: "行情延迟<1s，数据完整性>99.9%，异常行情自动过滤告警", dependency: "AMD行情平台/Bloomberg API/Wind数据接口"}
          - {id: F01-20, name: 交易数据接入, desc: "从OMS/交易终端实时获取成交回报（债券/回购/衍生品），含完整交易状态机（报盘/成交/撤单/部分成交）追踪", complexity: 中, days: 20, priority: P1, acceptance: "成交回报接收延迟<200ms，数据完整性100%，状态机覆盖全交易生命周期", dependency: "ATP报盘引擎/CFETS银行间接口/交易所接口"}
          - {id: F01-21, name: 持仓数据获取, desc: "期初从托管行/清算系统获取存量持仓，日间成交驱动增量更新，支持多来源持仓比对与主数据确认", complexity: 中, days: 20, priority: P1, acceptance: "期初持仓加载完成<7:00AM，日间增量延迟<500ms，多源持仓一致性核验通过率>99%", dependency: "中登/中债登/托管行SFTP接口/清算结算系统"}
      - id: H
        name: What-if 投资试算
        functions:
          - {id: F01-22, name: 多时态头寸视图, desc: "按任意历史as-of/as-on日期提取头寸快照（历史切片），同时支持基于未来现金流和已知事件的预测头寸视图，满足绩效复盘与流动性预判双场景", complexity: 高, days: 30, priority: P1, acceptance: "历史快照查询任意日期延迟<3s，预测视图覆盖30日前瞻", dependency: "IBOR事件存储引擎/现金流预测模块"}
          - {id: F01-23, name: 会计分类估值与稽核, desc: "按FVTPL（市值法）/FVOCI（可供出售）/AMC（摊余成本法）三类会计分类配置估值方法，颗粒度支持个券维度；内嵌估值稽核规则引擎与ABOR系统定期核对，差异自动预警", complexity: 高, days: 30, priority: P1, acceptance: "估值方法配置覆盖全品种，稽核规则命中率>99%，核对差异<0.01%", dependency: "资产主数据（会计分类标签）/ABOR会计系统/AMD估值数据"}
          - {id: F01-24, name: 手工补录与审批工作流, desc: "对上游系统缺失或错误数据支持手工增删改操作，修改后自动触发双级审批工作流，全操作记录审计日志，支持待办集中处理与历史审批检索", complexity: 中, days: 20, priority: P1, acceptance: "审批流配置覆盖100%手工操作类型，操作日志不可篡改，审批完成后数据生效<1min", dependency: "权限管理系统/IBOR数据核心层"}
          - {id: F01-25, name: 当日模拟试算, desc: "投资经理下达模拟交易指令（不实际成交），IBOR实时计算试算前后组合持仓/MtM/DV01/风险敞口变化，支持多方案并行对比及最优路径推荐", complexity: 高, days: 35, priority: P1, acceptance: "模拟指令生效<2s，试算结果与真实成交后结果误差<0.1%，支持≥10方案并行", dependency: "IBOR实时持仓/估值引擎/事前风控系统"}
          - {id: F01-26, name: 未来情景试算, desc: "基于假设的未来交易路径和市场情景（利率平移/信用冲击/流动性压力），预测未来N日组合持仓状态、现金流和风险敞口，输出情景P&L分布", complexity: 高, days: 30, priority: P1, acceptance: "支持≥3类情景参数配置，N日预测（N≤30）计算完成<30s", dependency: "IBOR现金流预测/量化定价引擎/FICC风险计量平台"}

  - "no": 2
    cn: 现券交易系统
    en: Bond Trading
    domain: 前台交易
    priority: P1
    market_demand: 5
    competitor_strength: 2
    current_state: L3
    target_state: L4
    gap: 小
    competitor: 恒生/金证
    foundation: ATP债券报盘引擎
    duration_m: 6
    team_sz: 8
    person_months: 42
    note: 银行间+交易所双市场覆盖
    source_slide: ~
    functions:
      - {id: F02-01, name: 银行间双边报价, desc: "CFETS/X-Bond两板块报价，支持询价（RFQ）和竞价", complexity: 高, days: 30, priority: P1}
      - {id: F02-02, name: 交易所债券委托, desc: 上交所/深交所债券买卖下单，支持限价/市价/条件单, complexity: 中, days: 20, priority: P1}
      - {id: F02-03, name: 收益率/价格计算, desc: 全品种YTM/价格双向转换，含含权债修正久期计算, complexity: 中, days: 15, priority: P1}
      - {id: F02-04, name: 交易前风险校验, desc: "调用事前风控接口，单笔限额/集中度/利率风险实时拦截", complexity: 中, days: 15, priority: P1}
      - {id: F02-05, name: 交易确认与指令生成, desc: 成交确认后自动生成DVP/FOP清算指令，推送清算结算模块, complexity: 高, days: 20, priority: P1}
      - {id: F02-06, name: 做市/询价接口, desc: 支持双边报价模式，库存自动刷新，与做市商系统预留接口, complexity: 中, days: 10, priority: P2}

  - "no": 3
    cn: 回购管理
    en: Repo Management
    domain: 前台交易
    priority: P1
    market_demand: 5
    competitor_strength: 2
    current_state: L2
    target_state: L4
    gap: 中
    competitor: 恒生/金证
    foundation: M9回购管理模块
    duration_m: 5
