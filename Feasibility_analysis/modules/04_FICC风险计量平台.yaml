module:
  'no': 4
  cn: FICC风险计量平台
  en: FICC Risk Measurement Platform
  domain: 中台风控
  priority: P1
  market_demand: 5
  competitor_strength: 4
  current_state: L2
  target_state: L4
  gap: 大
  competitor: 衡泰(垄断)
  foundation: ARC风险引擎/IBOR
  duration_m: 15
  team_sz: 12
  person_months: 135
  note: 替代衡泰老旧系统，信创切入口；覆盖投前/投中/投后全生命周期风险管理，新增信用风险计量（CVA/PD/LGD/IFRS9 ECL）、限额治理全生命周期、VaR回测框架（F04-10增强）、模型治理（新增F04-23）、pre-trade impact（Phase 2 F04-22）；对应PPT Slide 52
  source_slide: 52
  function_domains:
  - id: D1
    name: 投前风险分析
    functions:
    - id: F04-01
      name: 组合What-if分析
      desc: What-if情景建模，Duration & Convexity影响分析，VaR贡献分解，风险因子敞口，集中度分析
      complexity: 高
      days: 30
      priority: P1
    - id: F04-02
      name: 授权敞口分析
      desc: 交易前限额验证，交易对手/集中度/监管/组合约束多维度限额检查，Pre-trade拦截
      complexity: 高
      days: 25
      priority: P1
    - id: F04-03
      name: 投资预测分析
      desc: P&L与风险归因预测建模，收益率曲线/利差/波动率因子预测，组合构建优化，多情景对比分析
      complexity: 极高
      days: 35
      priority: P1
  - id: D2
    name: 投中实时监控
    functions:
    - id: F04-04
      name: 实时风险计量
      desc: Real-time DV01/CS01，Live VaR，Dynamic Greeks，日内P&L与归因，风险限额利用率实时展示
      complexity: 极高
      days: 40
      priority: P1
    - id: F04-05
      name: 交易对手风险实时监控
      desc: 实时敞口聚合，抵押品监控，信用限额使用率，结算风险，净额结算协议管理
      complexity: 高
      days: 30
      priority: P1
    - id: F04-06
      name: 流动性分析与交易成本
      desc: 执行风险监控，市场冲击分析，流动性成本追踪，滑点计量，最优执行合规
      complexity: 高
      days: 25
      priority: P1
    - id: F04-07
      name: 实时风险全景图
      desc: 实时持仓追踪，流式风险指标，实时限额监控，告警管理，异常跟踪仪表板
      complexity: 高
      days: 25
      priority: P1
  - id: D3
    name: 风控引擎
    functions:
    - id: F04-08
      name: DV01/CS01计算
      desc: dPV/dy价格敏感度，信用利差敏感度，分桶移动与关键期限，平行与非平行冲击
      complexity: 极高
      days: 40
      priority: P1
    - id: F04-09
      name: Greeks与敏感度计算
      desc: Delta/Gamma/Vega/Theta/Rho分布式实时计算，覆盖固收全品种与衍生品
      complexity: 极高
      days: 35
      priority: P1
    - id: F04-10
      name: VaR模型
      desc: 参数法/历史模拟法/蒙特卡洛三模式，Expected Shortfall；integrated daily backtesting framework：daily actual P&L vs predicted VaR tracking，exception flagging and reporting；quarterly Kupiec POF (Proportion of Failures) statistical test per regulatory standard；model exception log with severity levels，>3 exceptions/quarter triggers automatic re-calibration workflow to F04-23；VaR model validation reports auto-generated for regulatory submission (Basel III backtesting rules, FRTB internal model requirements)
      complexity: 极高
      days: 60
      priority: P1
      acceptance: Daily backtest completion <6:00AM，exception detection accuracy >95%，Kupiec POF test run quarterly with statistical documentation，regulatory reports auto-generated for compliance，model exception escalation <1h from detection
    - id: F04-11
      name: 压力测试与情景分析
      desc: 内置历史情景（GFC/COVID-19/利率冲击），假设情景（曲线扭转/利差走阔），反向压力测试
      complexity: 高
      days: 35
      priority: P1
    - id: F04-12
      name: 估值与盈亏分解
      desc: Carry & Roll-down，曲线效应，信用利差贡献，择券贡献，基于因子的盈亏多维分解
      complexity: 高
      days: 30
      priority: P1
    - id: F04-20
      name: 信用风险计量（CVA/PD/LGD）
      desc: 债券组合信用风险：基于历史迁移矩阵的发行人PD（违约概率）/LGD（违约损失率）估算，IFRS 9三阶段分类（Stage 1/2/3）预期信用损失（ECL）计算；OTC衍生品CVA（信用估值调整）/DVA（借方估值调整）：基于蒙特卡洛模拟的预期正敞口EPE × PD × LGD，信用迁移风险（1年/3年迁移矩阵压力测试）
      complexity: 极高
      days: 35
      priority: P1
      acceptance: CVA计算与对手方差异<1%，IFRS 9 ECL覆盖全债券持仓，PD/LGD数据源可追溯
      dependency: 定价平台M09（衍生品估值/EPE模拟，含M09 F09-16 XVA引擎）/IBOR持仓/外部信用评级数据（Wind/Bloomberg）
  - id: D4
    name: 投后风险分析
    functions:
    - id: F04-13
      name: 历史风险回溯
      desc: 历史VaR计算回放，压力测试结果归档，风险趋势分析，限额例外统计，VaR回测报告
      complexity: 中
      days: 20
      priority: P1
    - id: F04-15
      name: 监管报表与风控日报
      desc: 日/周/月风险报告自动生成，监管资本计算，Basel III/FRTB报送，压力测试摘要，风险归因仪表板
      complexity: 中
      days: 20
      priority: P1
    - id: F04-21
      name: 限额治理工作流
      desc: 全生命周期限额治理：新限额申请→风控审批→激活→日常利用率监控→超限告警（三级：预警/黄线/红线）→超限处置记录（豁免/压缩/升级审批）→定期复审（季度/年度自动触发）；限额与实际敞口双向穿透溯源；限额版本管理，历史变更审计，监管核查一键导出
      complexity: 中
      days: 20
      priority: P1
      acceptance: 超限告警延迟<1min，限额利用率仪表盘实时刷新，限额变更全程留痕，监管核查导出<5min
      dependency: M06合规规则（SSoT，限额参数引用M06 F06-02）/IBOR持仓/M04 F04-04实时风险计量
    - id: F04-23
      name: 模型治理与回测框架
      desc: Independent model risk governance infrastructure：daily backtesting of all risk models (VaR/Greeks/CVA/CVA)，exception tracking with severity classification；Kupiec POF statistical test performed quarterly；model exception investigation workflow with auto-escalation to quant team if >3 exceptions/quarter；regulatory model governance documentation (Basel III backtesting audit trail，FRTB internal model approval requirements)；exception resolution and model re-calibration scheduling；complete model inventory with version control，parameter audit trail，and approval workflow
      complexity: 中
      days: 20
      priority: P1
      acceptance: Daily backtest by 6am，exception report accuracy >95%，model governance documentation audit-ready for regulator review，exception escalation <1h from trigger，model parameter changes tracked with approval chain，Kupiec POF test results documented quarterly
      dependency: F04-10 (VaR model), F04-20 (credit risk CVA model), F04-08/09 (Greeks/DV01 calculations), all upstream risk calculation functions, independent data validation
  - id: D5
    name: 风控基础设施
    functions:
    - id: F04-16
      name: 数据底座与IBOR集成
      desc: 实时持仓追踪（事件溯源架构），全公司持仓聚合，实时数据验证与自动清洗，审计追踪
      complexity: 高
      days: 30
      priority: P1
    - id: F04-17
      name: 收益率曲线与波动率曲面
      desc: 利率曲线构建（多方法），波动率曲面，信用利差曲线，红利曲线，全公司一致性保障
      complexity: 高
      days: 30
      priority: P1
    - id: F04-18
      name: HPC计算网格
      desc: 分布式计算引擎，并行蒙特卡洛，压力测试网格调度，弹性扩容，p99计算延迟<5s
      complexity: 极高
      days: 40
      priority: P1
    - id: F04-19
      name: AI风险预警
      desc: 异常检测（ML模型），预测性分析，模式识别，智能告警，新业务合规风险预分析
      complexity: 高
      days: 30
      priority: P1
  tech_design:
    pattern: 事件驱动微服务 + HPC计算网格
    data_model: >
      Position (positionId, bookId, instrumentId, qty, marketValue, dv01, cs01, var1d) ;
      RiskLimit (limitId, dimension, limitType, threshold, current, utilizationPct) ;
      StressScenario (scenarioId, name, shockParams, asOf) ;
      RiskReport (reportId, reportType, asOf, content, status) ;
      CreditRiskMeasure (measureId, portfolioId, instrumentId, pd, lgd, ead, ecl, ifrStage, cva, dva, asOf) ;
      LimitGovernance (limitId, limitType, proposedBy, approvedBy, activatedAt, lastReviewAt, nextReviewAt, utilizationPct, breachCount, status[active|suspended|expired])
    core_stack: >
      Java 21 (风控引擎核心) + Python (ML/AI预警) + C++ (HPC数值计算) ;
      Apache Kafka (实时风险事件流) ; Redis (实时限额/持仓缓存) ;
      ClickHouse (历史风险数据分析) ; Kubernetes (HPC网格弹性调度)
    key_interfaces:
    - IBOR → 实时持仓推送 (Kafka topic: position.updated)
    - 定价平台(模块09) → 估值/Greeks数据 (gRPC streaming)
    - 现券交易/TRS → 交易事件 (Kafka topic: trade.executed)
    - 监管报送系统 → 标准化风险报告 (REST API)
    - 组合管理(模块07) → 向M07提供VaR/Greeks/DV01/CS01/情景计算服务 (gRPC，本模块作为计算引擎，M07作为消费方)
    key_decisions:
    - 采用Event Sourcing确保持仓数据全链路可审计，满足监管穿透式要求
    - HPC网格与业务逻辑解耦，支持蒙特卡洛/压力测试弹性扩容而不影响实时风控
    - VaR与Greeks共享同一套曲线/曲面构建服务，确保全公司数据一致性
    - 本模块职责边界：计算与治理（VaR引擎/限额执行/监管报送）；投资绩效归因（Campisi/Brinson）归属M07，不在本模块重复实现
    - 情景分析由本模块维护场景库并提供计算API；M07通过API调用获取场景P&L，M07自身拥有PM决策工作流（对冲建议/再平衡触发）
    open_questions:
    - FRTB内部模型法（IMA）vs标准法（SA）的选择取决于监管批准进度
    - AI预警模型的训练数据来源及监管合规性需法律确认
