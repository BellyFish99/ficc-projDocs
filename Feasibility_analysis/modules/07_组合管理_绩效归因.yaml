module:
  'no': 7
  cn: 组合管理+绩效归因
  en: Portfolio Mgmt & Perf
  domain: 前台投资管理
  priority: P1
  market_demand: 5
  competitor_strength: 3
  current_state: L2
  target_state: L4
  gap: 中
  competitor: SimCorp/衡泰
  foundation: M9 PMS模块
  duration_m: 15
  team_sz: 14
  person_months: 165
  note: 全资产组合管理工作台，十三大核心能力：全资产持仓模型/QP优化/Shadow Portfolio/Campisi 2.0固收归因/Brinson归因/因子风险分解+MCTR/Component VaR/敏感度/情景压测/流动性/Carry预算分析/交易成本TCA/绩效报告生成；对应PPT Slide 44 + gy_solution 4.4.1
  source_slide: 44
  data_inputs:
  - 交易数据
  - 头寸数据
  - 行情数据
  - 估值数据
  foundation_layer:
  - 定价计算
  - 利率曲线
  - 因子模型(2200+风险因子)
  function_domains:
  - id: A
    name: 全资产持仓管理
    functions:
    - id: F07-01
      name: 全资产统一持仓模型
      desc: 八类资产（利率债/信用债/权益/基金/黄金/商品/衍生品/非标）实时T+0持仓，多层组合树（公司→部门→策略→子组合→投资经理），穿透式敞口展示（品种/久期/评级/行业/地区分布），真实组合+Shadow Portfolio并行展示
      complexity: 高
      days: 60
      priority: P1
      acceptance: T+0持仓实时刷新，穿透层级≥5层，数据与IBOR差异<0.01%
      dependency: IBOR持仓账薄/AMD行情
    - id: F07-02
      name: 跨资产相关性分析
      desc: 全持仓跨资产相关矩阵（股/债/商品/衍生品/基金），多窗口滚动（20/60/252日），压力情景相关性vs历史相关性对比，动态相关性漂移预警，分散化比率(Diversification Ratio)计算，低相关候选资产推荐
      complexity: 高
      days: 30
      priority: P1
      acceptance: 相关矩阵计算<30s（500券组合），动态漂移预警阈值可配
      dependency: IBOR头寸/AMD历史行情
    - id: F07-03
      name: 相对价值分析
      desc: 利差/Z-spread/OAS相对价值计算，历史分位数定位（覆盖5年），跨品种套利信号识别，债券横截面信号挖掘（利差/久期偏差），时序均值回归分析
      complexity: 高
      days: 30
      priority: P1
      acceptance: OAS计算误差<1bps，历史分位数覆盖5年，横截面信号与实际收益相关性>0.3
      dependency: 定价平台/AMD行情
  - id: B
    name: 组合优化与再平衡
    functions:
    - id: F07-04
      name: QP智能再平衡引擎
      desc: 二次规划多目标优化（最小化跟踪误差+交易摩擦+融资成本+IFRS9波动），500+约束（合规/风险预算/流动性/IFRS9），2000+持仓毫秒级求解，支持整数规划（面值/手数取整），多期优化（含到期券），三种触发（定时/事件/手动），一键生成交易指令
      complexity: 高
      days: 60
      priority: P1
      acceptance: QP求解2000持仓<200ms，约束满足率100%，调仓前后TE对比即时输出
      dependency: 事前风控/合规/IBOR/现券系统/定价平台
    - id: F07-05
      name: Shadow Portfolio虚拟试算（调用M01持仓沙箱）
      desc: "【PM投资分析层】调用M01 F01-25 What-if持仓沙箱获取假设成交后的持仓快照，在此基础上本模块完成全套投资分析：100+虚拟组合并行（写时复制快照），多维试算（增减仓/换仓/加杠杆/新资产类别），即时计算试算后风险指标/因子暴露/归因/相关性/预期收益，真实vs虚拟差异对比视图，冲击成本预估。持仓计算层在M01，分析层在本模块"
      complexity: 高
      days: 60
      priority: P1
      acceptance: 虚拟组合模拟与真实执行偏差<0.3%，秒级响应，100+并行无数据污染
      dependency: M01 F01-25（What-if持仓沙箱）/M09定价平台/M08因子暴露API/现券交易系统
    - id: F07-06
      name: 资产配置策略分析
      desc: SAA战略→TAA战术精准联动（投委会指令直接转化为因子约束输入QP引擎），宏观因子（利率/信用/流动性周期）驱动大类资产配置模型，动态权重优化，历史回测验证（≥5年），固收+策略P&L归因（债券底仓+衍生品增强）
      complexity: 高
      days: 60
      priority: P2
      acceptance: 回测期≥5年，预测方向胜率>55%，SAA→TAA指令转化全程无人工干预
      dependency: AMD宏观数据/因子模型/IBOR
  - id: C
    name: 绩效归因
    functions:
    - id: F07-07
      name: Campisi 2.0 固收绩效归因
      desc: 固定收益五效应完整拆解：①收入效应（票息+摊销），②国债效应（利率平移/曲线斜率/曲率三效应分离，用Key Rate Duration精确映射），③利差效应（DTS贡献/行业配置效应/个券选择效应），④交易效应（择时Alpha或损耗量化），⑤残差校验（<5bp合格）；日/周/月/季多维度报告自动生成
      complexity: 高
      days: 50
      priority: P1
      acceptance: 五效应合计与实际收益残差<5bps，T+1 9:00前自动报告
      dependency: IBOR持仓/AMD行情/定价平台
    - id: F07-08
      name: Brinson 资产组合绩效归因
      desc: 三效应：大类资产配置效应（超/低配决策贡献）/个券选择效应（同类标的选择Alpha）/交互效应，支持多层穿透（资产大类→行业→子行业→个股/个基），FOF基金穿透底层持仓，日/月/季/年累计归因趋势，投资经理能力量化排名
      complexity: 高
      days: 40
      priority: P1
      acceptance: Brinson结果与Bloomberg AIM误差<0.1%，穿透层级≥4层
      dependency: IBOR持仓/AMD行情/指数数据
    - id: F07-09
      name: 指数跟踪误差与主动风险归因
      desc: 对标中债综合/信用/政策行等基准指数，跟踪误差（TE）日频监控，TE分解（配置效应TE+选券效应TE+协方差），信息比率（IR）实时监控（目标IR>0.5，预警IR连续3月<0），超额Alpha三因子分解
      complexity: 中
      days: 30
      priority: P1
      acceptance: TE计算误差<1bps，支持≥10基准指数，IR预警自动推送
      dependency: AMD中债估值/IBOR持仓/因子模型
    - id: F07-19
      name: 净利差与Carry预算分析
      desc: 逐券Carry分解（票息收入−回购成本−摊销损益）与Roll-down P&L，构建组合Carry热力图（信用类vs利率类carry对比）；Carry预算与实际消耗追踪，偏离超阈值自动预警；Carry归因拆分（利率carry/信用carry/久期carry）供投委会汇报
      complexity: 中
      days: 25
      priority: P1
      acceptance: 逐券Carry计算与实际票息收入误差<1bps，Carry预算仪表盘T+1 9:00前自动刷新
      dependency: IBOR持仓/AMD行情（回购利率/票面利率）/定价平台（估值价格）
    - id: F07-21
      name: 绩效报告生成
      desc: TWR（时间加权收益率）/MWR（资金加权收益率）多期计算，Grap算法多期归因链接（月度→季度→年度），PM工作台标准化绩效仪表盘（夏普/IR/最大回撤/信息比率），自动生成投委会汇报材料（PDF/PPT），历史归因报告版本存档与对比
      complexity: 中
      days: 20
      priority: P1
      acceptance: TWR/MWR与Bloomberg AIM误差<0.1%，月度报告T+1 9:00前自动生成，支持≥12期累计归因
      dependency: M07归因引擎（F07-07/F07-08）/IBOR持仓/AMD指数基准
  - id: D
    name: 风险计量
    functions:
    - id: F07-10
      name: 因子风险分解 + MCTR边际风险贡献（消费M08因子暴露）
      desc: "【消费M08因子暴露结果】将组合持仓分解为系统性风险（2200+因子，来自M08）+特异性风险；计算MCTR边际风险贡献（∂组合波动率/∂持仓权重，热路径用C++矩阵求导），输出风险消耗排名（识别「风险大户」），驱动减仓/加仓优先级，提供QP再平衡的风险预算约束输入。本模块不计算因子协方差矩阵，协方差矩阵由M08维护"
      complexity: 高
      days: 60
      priority: P1
      acceptance: 因子模型解释方差>80%（由M08保证），MCTR实时更新延迟<5s，风险预算仪表盘刷新延迟<5s
      dependency: M08因子暴露API（协方差矩阵）/IBOR持仓/定价平台
    - id: F07-11
      name: Component VaR 四层穿透展示（调用M04引擎）
      desc: PM决策展示层——调用M04(F04-10)VaR计算引擎获取三方法结果，在本模块实现四层穿透钻取：资产类别VaR→行业/子市场VaR→评级/信用质量VaR→单一发行人Component VaR，含跨类分散化收益量化；本模块不重复实现VaR计算，专注投资决策视角的风险溯源与持仓优化引导
      complexity: 中
      days: 40
      priority: P1
      acceptance: 穿透至发行人层展示<3s，三方法差异预警由M04提供，本模块直接透传
      dependency: FICC风险计量平台(M04 F04-10)/IBOR
    - id: F07-12
      name: 敏感度展示（多维Shock Grid，调用M04引擎）
      desc: PM决策展示层——M04(F04-08/09)计算DV01/CS01/Greeks，本模块负责：组合层面聚合（按资产类别/行业/评级汇总），构建利率×信用利差二维冲击矩阵（Shock Grid 5×5），识别最脆弱组合方向，输出对冲比率建议；本模块不重复实现敏感度计算
      complexity: 中
      days: 40
      priority: P1
      acceptance: Shock Grid 5×5矩阵实时刷新，组合DV01聚合与M04单券结果误差<0.1bps
      dependency: FICC风险计量平台(M04 F04-08/09)/定价平台(M09 KRD)/IBOR
    - id: F07-13
      name: 情景分析PM决策层（调用M04场景库）
      desc: PM投资决策层——M04(F04-11)维护历史场景库并提供计算API，本模块负责：①调用M04获取场景P&L结果（924行情/包商/钱荒/股灾等8+历史场景+自定义场景），②PM工作流：基于场景结果生成对冲建议、触发再平衡方案、输出持仓调整优先级，③反向压力测试（倒推临界情景→止损线设计依据）；场景库维护与全公司治理由M04负责
      complexity: 中
      days: 60
      priority: P1
      acceptance: 调用M04 API获取场景P&L<2s，PM决策输出（对冲建议）<5s，≥20情景并行
      dependency: FICC风险计量平台(M04 F04-11 场景API)/定价平台
  - id: E
    name: 流动性与对冲管理
    functions:
    - id: F07-14
      name: 流动性风险管理（LVaR）
      desc: 逐持仓变现能力评估（规模/日均成交量→变现天数），Almgren-Chriss市场冲击成本模型，流动性压力测试（X天内变现Y亿最优路径+成本），流动性调整VaR（LVaR=传统VaR+流动性溢价），流动性覆盖率/缓冲监控（1/3/5/10日分层），回购到期日历
      complexity: 中
      days: 50
      priority: P1
      acceptance: LVaR与市场基准误差<5%，日均成交量覆盖≥95%持仓，变现路径建议<3s
      dependency: AMD行情/IBOR持仓
    - id: F07-15
      name: 衍生品对冲决策引擎
      desc: 七类工具矩阵（国债期货2/5/10/30Y/IRS/CDS/股指期货IF/IH/IC/IM/股指期权/黄金期货/外汇远掉期），系统推荐最优对冲方案（成本最小约束），一键生成对冲指令，对冲效果追踪（前后风险指标对比/效率/执行滑点）；支持快速/精细/尾部/跨资产四种场景
      complexity: 高
      days: 40
      priority: P2
      acceptance: 对冲方案推荐<5s，DV01对冲误差<5%，指令自动流转执行引擎
      dependency: 衍生品交易系统/IBOR/定价平台/事前风控
    - id: F07-20
      name: 交易成本分析TCA
      desc: 事后TCA：实施成本差（Implementation Shortfall = 决策时盘中价−成交均价）、VWAP/TWAP基准偏差，滑点分解（市场冲击+时机成本+价差成本）；经纪商执行质量排名（月度），超额成本自动触发路由策略优化建议；TCA结果回写F07-07归因（提升交易效应精确度）
      complexity: 中
      days: 20
      priority: P2
      acceptance: TCA报告T+1生成，经纪商排名覆盖≥90%成交量，实施成本差计算与外部TCA服务误差<1bps
      dependency: IBOR交易记录/AMD实时行情（决策时间戳价格）/现券交易系统成交回报
  - id: F
    name: 量化底座集成
    functions:
    - id: F07-16
      name: 定价计算集成
      desc: 调用定价平台实时估值与Greeks（含权债/可转债/IRS），Redis缓存结果，Kafka推送持仓+估值变化事件，日终全量估值批处理
      complexity: 高
      days: 30
      priority: P2
      acceptance: 定价API p99<200ms，日终全量估值<30min（10万券）
      dependency: 定价平台
    - id: F07-17
      name: 利率曲线集成
      desc: 多曲线实时消费（国债/政策行/AAA信用/OIS），NS参数提取（水平/斜率/曲率），关键期限点敏感度映射，曲线版本快照（供归因历史复现）
      complexity: 中
      days: 30
      priority: P1
      acceptance: 曲线更新延迟<1s，NS拟合R²>0.999
      dependency: AMD行情平台/定价平台
    - id: F07-18
      name: 因子暴露集成（消费M08，不建模）
      desc: "【消费方】消费M08发布的逐券因子载荷与协方差矩阵，本模块负责：①按持仓权重聚合组合层面2200+风险因子暴露（利率/信用/流动性/权益Beta/行业/风格/商品/汇率八类），②因子暴露历史追踪与漂移预警，③因子风险预算仪表盘（已用/剩余/三档预警）。因子定义/协方差矩阵/逐券载荷计算全部由M08负责，本模块零重复建设"
      complexity: 中
      days: 25
      priority: P1
      acceptance: 组合因子暴露聚合延迟<10s，因子模型解释方差>80%（由M08保证），风险预算仪表盘实时刷新
      dependency: M08因子暴露API（逐券载荷+协方差矩阵）/M09定价平台（逐券DV01·CS01·KRD）/IBOR持仓
  tech_design:
    pattern: 因子驱动组合管理引擎（QP优化器 + 2200因子模型 + Campisi/Brinson双归因 + 三方法Component VaR）
    data_model: >
      Portfolio (portfolioId, managerId, level, parentId, benchmarkId, riskBudget, riskBudgetUsed) ;
      Position (positionId, portfolioId, assetClass, bondId, qty, marketValue, pnl, updatedAt) ;
      FactorExposure (portfolioId, factorId, factorType, exposure, mctr, riskContribPct, asOf) ;
      Attribution (portfolioId, date, model[campisi|brinson], incomeEffect, rateFlatEffect, rateSlopeEffect, rateCurvatureEffect, spreadDtsEffect, spreadSectorEffect, spreadSelectionEffect, tradeEffect, allocationEffect, selectionEffect, interactionEffect, residual) ;
      ComponentVarResult (portfolioId, layer[asset|sector|rating|issuer], entityId, varContrib, diversBenefit, method[hist|mc|param], confidenceLevel, asOf) ;
      ScenarioResult (scenarioId, portfolioId, scenarioType[hist|custom|reverse], shockParams, pnlImpact, worstHoldings, hedgeSuggestion, computedAt) ;
      ShadowPortfolio (shadowId, basePortfolioId, trialParams, preRiskMetrics, postRiskMetrics, impactCost, status, createdAt) ;
      RebalanceSuggestion (sugId, portfolioId, triggerType[scheduled|event|manual], tradeList, preTE, postTE, costEstimate, ifrs9Impact, status, createdAt) ;
      HedgeRecommendation (recId, portfolioId, targetExposure, toolMix, estimatedCost, preRisk, postRisk, status, createdAt) ;
      LiquidityProfile (positionId, avgDailyVolume, liquidationDays, impactCost, lvar, updatedAt) ;
      LiquidityCashflow (portfolioId, date, repoMaturity, netCashNeed, liquidableBuffer, updatedAt) ;
      CarryAnalysis (portfolioId, positionId, couponIncome, repoCost, rolldownPnl, netCarry, carryType[rate|credit|duration], asOf) ;
      TCAResult (tradeId, benchmarkType[vwap|twap|is], benchmarkPrice, execPrice, implementationShortfall, marketImpact, timingCost, spreadCost, brokerId, asOf) ;
      PerformanceReport (reportId, portfolioId, periodType[monthly|quarterly|annual], twr, mwr, sharpe, ir, maxDrawdown, attributionLinked, generatedAt)
    core_stack: >
      Java 21 (组合管理/归因/流动性/指令流转引擎) ;
      Python + CVXPY/OSQP (QP再平衡求解器，支持整数规划用Gurobi) ;
      Python (Campisi 2.0归因/Brinson归因/因子暴露聚合/Almgren-Chriss流动性成本) ;
      C++ (MCTR矩阵求导/Component VaR协方差计算，高频热路径) ;
      Monte Carlo引擎: Python + NumPy并行 (10,000次模拟，可选GPU加速) ;
      Redis (实时因子暴露/MCTR/持仓缓存，TTL=1min) ;
      Kafka (持仓变化事件流/估值更新推送) ;
      TimescaleDB (归因历史时序/情景结果，按portfolioId+date分区) ;
      PostgreSQL (组合树/再平衡指令/对冲方案) ;
      React (投资驾驶舱，组合树/Shock Grid/MCTR热力图可视化)
    key_interfaces:
    - IBOR → 实时持仓/历史交易/组合树 (Kafka推送，持仓变化事件<200ms)
    - 定价平台(模块09) → 实时估值/Greeks/利率曲线/逐券KRD (gRPC streaming，KRD直接用于Campisi归因，本模块不自建)
    - 策略投资_量化(模块08) → 2200+因子模型因子暴露结果消费 (内部API，本模块不重复建模)
    - 行情平台 → 历史行情/指数成分/宏观因子数据 (Kafka实时+SFTP批量)
    - WIND → 指数基准成分券/宏观因子/基金持仓穿透 (HTTP API+定时拉取)
    - 事前风控 → QP优化四类约束实时同步（合规/风险预算/流动性/IFRS9）(REST)
    - 现券/衍生品交易系统 → 本模块指令管理引擎推送执行指令 (内部REST，含审批状态回调)
