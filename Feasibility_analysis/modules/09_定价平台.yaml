module:
  'no': 9
  cn: 定价平台
  en: Pricing Platform
  domain: 中台定价
  priority: P2
  market_demand: 5
  competitor_strength: 5
  current_state: L1
  target_state: L4
  gap: 大
  competitor: 衡泰(垄断)
  foundation: ARC基础数值库
  duration_m: 20
  team_sz: 15
  person_months: 235
  note: 蒙特卡洛/有限差分，替代衡泰核心，覆盖权益/利率/大宗商品/外汇/衍生品全品种；Phase 1强化：曲线平滑+套利检测（F09-04增强），DQ-first数据治理；新增XVA引擎（CVA/DVA/FVA）、模型验证/P&L Explain、多曲线折扣(Phase 3)；对应PPT Slide 56
  source_slide: 56
  function_domains:
  - id: D1
    name: 金融产品覆盖
    functions:
    - id: F09-01
      name: 期权收益结构定价
      desc: 香草期权/价差期权/欧式/美式/雪球/自定义期权定价，挂钩标的覆盖国债/期货/股票/指数/商品
      complexity: 极高
      days: 60
      priority: P2
    - id: F09-02
      name: 结构化产品定价
      desc: 场外期权/远期/收益凭证/收益互换/融资融券/合约型互换定价，支持自定义结构化产品
      complexity: 极高
      days: 50
      priority: P2
    - id: F09-03
      name: 固收品种定价
      desc: 固息/浮息国债，含权债，可转债精确定价，信用债估值，ABS定价
      complexity: 高
      days: 40
      priority: P2
  - id: D2
    name: 市场数据底座
    functions:
    - id: F09-04
      name: 利率与信用曲线构建（全公司统一曲线服务）
      desc: 利率曲线（多插值方法）、信用利差曲线、利差曲线、违底线、全品种统一曲线服务（为M04风险计量/M07组合管理/M08因子模型/M01预测分析提供曲线基础）；新增automated curve smoothing（spline tension controls, Piecewise-Linear Moneyness interpolation）保证曲线平滑性；arbitrage validation pipeline：overnight batch after daily curve recalibration进行：(1)negative forward detection（无负利率），(2)cheap bond detection（price < dirty price floor），(3)cross-curve arbitrage checks；validation failure自动trigger manual review workflow；clean curve snapshot materialized in Redis for intraday consumption；smoothness metrics + arbitrage violations reported to F01-29 DQ Dashboard；支持多曲线框架（OIS/SOFR vs LIBOR/SONIA basis）供XVA引擎消费
      complexity: 极高
      days: 70
      priority: P2
      acceptance: Curve smoothing ensures no arbitrage violations for consecutive >30 days，negative forward detection accuracy 100%，cheap bond detection accuracy >99%，arbitrage validation completion <10min after overnight curve build，clean curve snapshots ready by 6:30am for market open，DQ metrics push to F01-29 real-time，API支持≥10个下游消费系统并发请求
    - id: F09-05
      name: 波动率曲面构建
      desc: 隐含波动率曲面，红利曲线，汇率曲线，Local Volatility曲面，波动率微笑校准
      complexity: 极高
      days: 50
      priority: P2
    - id: F09-06
      name: 市场数据管理
      desc: 境内外权益/债券/外汇/商品资讯统一接入，数据清洗，异常值处理，数据质量监控
      complexity: 高
      days: 30
      priority: P2
  - id: D3
    name: 定价模型引擎
    functions:
    - id: F09-07
      name: 蒙特卡洛求解器
      desc: GPU加速MC，QMC低差异序列，支持路径相关期权定价，并行情景模拟
      complexity: 极高
      days: 70
      priority: P2
    - id: F09-08
      name: 解析解与数值解
      desc: Black-Scholes解析解，Hull-White利率模型，SABR波动率模型，二叉树/三叉树数值解
      complexity: 极高
      days: 60
      priority: P2
    - id: F09-09
      name: 有限差分（PDE）
      desc: Crank-Nicolson/ADI方法，含权债/可转债精确定价，局部波动率模型数值解
      complexity: 极高
      days: 60
      priority: P2
    - id: F09-10
      name: 实时Greeks与敏感度计算（M01/M04/M07/M08共用基础）
      desc: "分布式实时计算全品种逐券敏感度，结果为M01衍生品MtM/M04风险聚合/M07归因展示/M08因子载荷四方共用权威数据源：Delta/Gamma/Vega/Theta/Rho（期权/结构化产品），DV01/CS01/Key Rate Duration分桶（KRD，覆盖含权债/可转债/利率债全品种），分桶利差敏感度。本模块为唯一定价计算权威，所有消费方禁止重复计算（M04 F04-08/F04-09/M07 F07-12/M08因子载荷均为消费视图）"
      complexity: 高
      days: 40
      priority: P2
      acceptance: 全品种Greeks/DV01/CS01/KRD覆盖率100%，单券计算延迟<200ms，并发支持≥20消费方
      dependency: F09-04曲线/F09-05波动率曲面/F09-07~F09-09模型引擎/IBOR持仓
  - id: D4
    name: 定价应用场景
    functions:
    - id: F09-11
      name: 估值与结算计算
      desc: 日终估值，盯市计算，保证金计算，结算价格，历史估值回测与误差分析
      complexity: 高
      days: 40
      priority: P2
    - id: F09-12
      name: 风控与情景计算
      desc: 风险计量（VaR/压力测试）调用，情景分析，保证金计算，为风控平台提供统一定价接口
      complexity: 高
      days: 35
      priority: P2
    - id: F09-13
      name: 客需报价服务
      desc: 为销售交易/TRS系统提供实时报价，一站式报价接口，支持结构化产品定制化快速报价
      complexity: 高
      days: 35
      priority: P2
    - id: F09-16
      name: XVA计算引擎（CVA/DVA/FVA）
      desc: 场外衍生品全套XVA计算：CVA（信用估值调整）= EPE × 对手方PD × LGD；DVA（借方估值调整）= ENE × 自身PD × LGD；FVA（融资估值调整）= 融资利差 × 资金净敞口；蒙特卡洛路径模拟（1000+路径，支持GPU加速），IFRS 13第三层级公允价值合规；CVA/DVA结果供M04 F04-20信用风险计量消费，FVA供交易定价和P&L Explain消费
      complexity: 极高
      days: 50
      priority: P2
      acceptance: CVA计算单笔IRS p99<1s，EPE曲线与行业工具误差<2%，IFRS 13文档输出满足审计要求
      dependency: 定价模型引擎（MC求解器F09-07）/交易对手信用数据（PD/LGD，外部数据源）/M09曲线服务（F09-04）
  - id: D5
    name: 平台基础设施
    functions:
    - id: F09-14
      name: 定价微服务架构
      desc: REST/gRPC定价API，横向弹性扩容，p99<100ms，模型插件化注册，版本管理
      complexity: 高
      days: 40
      priority: P2
    - id: F09-15
      name: 灵活二次开发能力
      desc: 全平台级/单功能模块级/系统框架级可扩展，支持自定义模型接入，策略团队自助扩展
      complexity: 高
      days: 30
      priority: P2
    - id: F09-17
      name: 定价模型验证与P&L Explain
      desc: 每日P&L Explain：理论P&L（Greeks × 市场因子变动）与实际P&L对比，逐笔差异分类（模型误差/交易摩擦/数据质量/新交易），差异超阈值自动告警；模型回测：定价模型预测价格 vs 市场成交价，统计检验（Kupiec/Christoffersen），回测报告按模型类型（BS/HW/SABR等）分类归档；价格争议审计追踪：逐笔定价记录+参数快照存档，支持T+5内完整再现定价过程
      complexity: 高
      days: 30
      priority: P2
      acceptance: P&L Explain覆盖率≥95%持仓，差异阈值可配，争议定价T+5内完整复现，模型回测报告月度自动生成
      dependency: 定价平台核心引擎（F09-07~F09-10）/IBOR实际P&L数据/市场成交数据
  tech_design:
    pattern: 微服务定价引擎 + HPC数值计算网格（GPU加速）
    data_model: >
      PricingRequest (reqId, productType, params, asOf, requestedBy) ;
      PricingResult (reqId, price, greeks, modelUsed, latencyMs, computedAt) ;
      CurveSnapshot (curveId, curveType, nodes, interpolation, asOf) ;
      VolSurface (surfaceId, underlier, strikes, expiries, vols, asOf) ;
      XVAResult (tradeId, cva, dva, fva, epe, ene, counterpartyPd, asOf) ;
      ModelValidation (modelId, date, theoreticalPnl, actualPnl, explainGap, testResult[pass|warning|fail], reportRef)
    core_stack: >
      C++ (核心数值计算，蒙特卡洛/PDE引擎) + Python (曲线构建/数据清洗) ;
      CUDA/GPU (蒙特卡洛并行加速) ;
      gRPC (高性能定价API) ; Redis (曲线/曲面实时缓存) ;
      Kubernetes (弹性计算网格调度)
    key_interfaces:
    - 行情平台 → 实时市场数据 (Kafka)
    - M04风险计量平台 → 定价/Greeks/情景计算 (gRPC streaming)
    - M07组合管理 → 实时估值/Greeks/KRD（Campisi归因所需逐券KRD，gRPC）
    - M08策略投资_量化 → 逐券DV01/CS01/KRD/Greeks（作为因子载荷原始输入，gRPC）；曲线/估值（策略研究消费）
    - 销售交易/TRS → 客需实时报价 (REST, p99<100ms)
    key_decisions:
    - 本模块边界：只负责定价/曲线/Greeks/敏感度计算，不建因子模型；M08消费本模块DV01/CS01/KRD/Greeks作为因子载荷输入，M09无感知因子体系
    - KRD必须覆盖全品种（含权债/可转债），因为M07 Campisi 2.0归因依赖逐券KRD，缺品种覆盖直接导致归因误差
    - 所有系统使用同一套曲线/曲面服务，确保全公司定价一致性，避免数据割裂；曲线构建职责100%归属M09 F09-04/F09-05，M04/M07/M01等所有消费方通过gRPC API调用，禁止重复实现
    - 模型插件化设计，新产品定价模型无需修改核心引擎即可接入
    - GPU加速仅用于批量蒙特卡洛，实时Greeks路径使用解析解保证低延迟
    open_questions:
    - GPU集群采购与信创兼容性（国产GPU如昆仑/寒武纪 vs NVIDIA）
    - 衡泰现有定价模型参数迁移方案（模型验证与对标测试周期估计6个月）
