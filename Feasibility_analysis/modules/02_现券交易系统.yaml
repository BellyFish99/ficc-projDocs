  note: 银行间+交易所双市场覆盖
  source_slide: null
  functions:
  - id: F02-01
    name: 银行间双边报价
    desc: CFETS/X-Bond两板块报价，支持询价（RFQ）和竞价
    complexity: 高
    days: 30
    priority: P1
  - id: F02-02
    name: 交易所债券委托
    desc: 上交所/深交所债券买卖下单，支持限价/市价/条件单
    complexity: 中
    days: 20
    priority: P1
