    name: 收益率/价格计算
    desc: 全品种YTM/价格双向转换，含含权债修正久期计算
    complexity: 中
    days: 15
    priority: P1
  - id: F02-04
    name: 交易前风险校验
    desc: 调用事前风控接口，单笔限额/集中度/利率风险实时拦截
    complexity: 中
    days: 15
    priority: P1
  - id: F02-05
    name: 交易确认与指令生成
    desc: 成交确认后自动生成DVP/FOP清算指令，推送清算结算模块
    complexity: 高
    days: 20
    priority: P1
  - id: F02-06
    name: 做市/询价接口
    desc: 支持双边报价模式，库存自动刷新，与做市商系统预留接口
    complexity: 中
    days: 10
    priority: P2
