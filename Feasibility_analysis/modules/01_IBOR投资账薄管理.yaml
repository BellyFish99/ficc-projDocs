module:
  'no': 1
  cn: IBOR投资账薄管理
  en: IBOR
  domain: 前/中台基础设施
  priority: P1
  market_demand: 5
  competitor_strength: 3
  current_state: L2
  target_state: L4
  gap: 中
  competitor: 衡泰(ABOR)
  foundation: AMI/AMDB账户体系
  duration_m: 13
  team_sz: 14
  person_months: 133
  note: 整个FICC平台的账薄主干，27项功能（新增F01-29数据质量监控）覆盖持仓/现金/估值/事件/对账/监管报送/试算/抵押品/数据质量全链路；核心创新：ML-based reconciliation (F01-14)，DQ-first foundation (F01-29)，CA-aware sandbox (F01-25)；合规检查规则与执行由M06负责，情景P&L分析由M04+M07负责，IBOR为SSoT数据源
  source_slide: 55
  data_inputs:
  - 交易指令数据
  - 行情/估值数据
  - 资产主数据
  - 托管行结算通知
  foundation_layer:
  - 账户体系(AMI/AMDB)
  - Kafka实时消息
  - Redis分布式缓存
  function_domains:
  - id: A
    name: 实时持仓管理
    functions:
    - id: F01-01
      name: 全资产实时头寸
      desc: 权益/债券/期货/回购/利率衍生品全品种T0实时持仓，含未交割与待交割敞口分层展示
      complexity: 高
      days: 60
      priority: P1
      acceptance: 持仓更新延迟<500ms，全品种覆盖率100%
      dependency: 交易系统OMS/ATP报盘接口
    - id: F01-02
      name: 多账户层级汇总
      desc: 基金/策略/组合/公司四级持仓合并与分拆，支持跨基金同标的穿透聚合
      complexity: 中
      days: 30
      priority: P1
      acceptance: 层级汇总数据与单账户加总误差为零
      dependency: AMI/AMDB账户主数据
    - id: F01-03
      name: 账薄T0/T1切换
      desc: 交易日账薄（含未交割）与结算账薄（T+1已交割）自动切换，切换耗时<1min
      complexity: 中
      days: 30
      priority: P1
      acceptance: T0/T1持仓差=未交割敞口，自动核验通过率>99%
      dependency: 中登/中债登/上清结算接口
    - id: F01-04
      name: 可用券与冻结管理
      desc: 质押券/司法冻结券/回购占用券从可用头寸自动剔除，前台实时可用量查询
      complexity: 中
      days: 30
      priority: P1
      acceptance: 可用量计算误差为零，冻结事件<30s生效
      dependency: 回购管理系统/风控系统
    - id: F01-27
      name: 资产打标与组合树管理
      desc: 多维度资产标签体系（评级/行业/策略/流动性层级/会计分类）灵活配置，支持自定义组合树构建多分析视角；标签驱动持仓穿透聚合和报表分组
      complexity: 中
      days: 30
      priority: P2
      acceptance: 标签体系支持≥10维度，组合树层级≥4级，标签变更<1min生效影响所有聚合视图
      dependency: 资产主数据/IBOR持仓引擎/报表系统
  - id: B
    name: 现金管理
    functions:
    - id: F01-05
      name: 实时现金余额
      desc: 多账户已结算/未结算现金实时汇总，T0资金头寸含日间资金划拨记录
      complexity: 高
      days: 60
      priority: P1
      acceptance: 现金余额与银行回单误差为零，日中更新频率≥每分钟
      dependency: 资金系统/清算结算接口
    - id: F01-06
      name: 现金流预测
      desc: 回购到期/票息支付/衍生品结算现金流7-30日滚动预测，流动性缺口预警
      complexity: 高
      days: 40
      priority: P1
      acceptance: 7日现金流预测准确率>95%，流动性预警提前24h触发
      dependency: 回购管理/利率衍生品/IBOR持仓
    - id: F01-07
      name: 多币种资金管理
      desc: CNY/USD/HKD等多币种现金分账户轧差，FX即期换算折算人民币净敞口
      complexity: 中
      days: 50
      priority: P2
      acceptance: 多币种折算汇率误差<0.01%，轧差结果实时刷新
      dependency: 外汇系统/AMD行情平台
  - id: C
    name: 估值与净值
    functions:
    - id: F01-08
      name: 实时市值计算
      desc: 接入AMD/Bloomberg/Wind估值价格，全持仓实时MtM与日内PnL计算，支持估值价格覆盖
      complexity: 高
      days: 50
      priority: P1
      acceptance: MtM更新延迟<1s，估值覆盖审批留痕100%
      dependency: AMD行情平台/Bloomberg数据接口
    - id: F01-09
      name: 应计利息计算
      desc: 债券应计利息按实际/365、实际/360、30/360多计息基准精确计算，日终净值自动生成
      complexity: 中
      days: 30
      priority: P1
      acceptance: 应计利息与Bloomberg基准误差<0.01元/百元面值
      dependency: 资产主数据（票面率/计息基准/付息频率）
    - id: F01-10
      name: 衍生品逐日盯市
      desc: IRS/CDS/国债期货逐日MtM计算，保证金余额实时更新，追加保证金（Margin Call）自动触发
      complexity: 高
      days: 50
      priority: P1
      acceptance: 衍生品MtM与对手方差异<0.5bps，Margin Call触发延迟<5min
      dependency: 量化定价引擎/交易对手管理
  - id: D
    name: 事件处理
    functions:
    - id: F01-11
      name: 付息与到期处理
      desc: 债券票息自动计算并入账，到期本金偿还自动处理，含权债（可赎回/可回售）行权事件提醒与执行
      complexity: 高
      days: 30
      priority: P1
      acceptance: 付息/到期处理T+0完成，含权债提前5交易日发起行权提示
      dependency: 资产主数据/托管行结算通知
    - id: F01-12
      name: 回购滚动管理
      desc: 质押式/买断式回购到期自动识别，支持一键续作指令生成，回购占用券随生命周期自动更新
      complexity: 高
      days: 30
      priority: P1
      acceptance: 到期回购提前1日预警，续作指令生成成功率>99%
      dependency: 回购管理系统/IBOR头寸
    - id: F01-13
      name: 公司行为通知
      desc: 债券评级变动/提前偿还/强制赎回等公司行为实时推送，影响持仓自动标注，处理决策记录留痕
      complexity: 中
      days: 30
      priority: P2
      acceptance: 公司行为推送延迟<30min，影响持仓标注覆盖率100%
      dependency: AMD行情平台/资产主数据
  - id: E
    name: 对账与数据质量
    functions:
    - id: F01-14
      name: 托管行持仓对账
      desc: 与中登（交易所债券）、中债登（银行间债券）日终持仓对账，差异自动分类（未交割/错误/缺漏）并推送告警；新增ML-based break matching（容差窗口/多规则自动路由）、Temporal-backed exception workflow（自动→经理审批→CRO升级）、Reconciliation Dashboard（实时break aging/SLA追踪）；集成F01-29 DQ监控作为前置条件，确保数据质量后再进行对账
      complexity: 高
      days: 75
      priority: P1
      acceptance: 日终对账完成时间<6:00AM，差异识别率>98%，break自动解决率>80%（ML匹配），exception routing <30s，manager review trigger by T+2
      dependency: 中登/中债登结算接口/SFTP
    - id: F01-15
      name: IBOR-ABOR差异对比
      desc: 投资账薄（实时）与会计账薄（已结算）差异对比，差异原因自动分类（未结算/估值差/计提差），供中台复核；exception workflow集成：差异超阈值自动流转F01-14工作流；数据质量指标推送至F01-29 DQ Dashboard
      complexity: 中
      days: 60
      priority: P1
      acceptance: IBOR-ABOR差异原因分类准确率>98%，日终净值差=0（已结算口径）
      dependency: 会计核算系统(ABOR)/IBOR持仓
    - id: F01-16
      name: 交割失败追踪
      desc: 未交割记录全生命周期管理，T+N逾期告警，补交割流程触发，交割失败率统计分析
      complexity: 中
      days: 30
      priority: P1
      acceptance: 交割失败识别延迟<1h，补交割触发成功率>95%
      dependency: 清算结算系统/中登中债登
  - id: F
    name: 监管数据输出
    functions:
    - id: F01-18
      name: 监管报送数据支持（数据提取，非合规逻辑）
      desc: "【数据提取输出】基于IBOR持仓/交易/资金数据，按人民银行/证监会/银保监会格式打包生成报送数据；支持报表模板配置与定时推送至监管接口。本功能仅负责数据提取与格式转换，合规规则解释与违规判定由M06负责"
      complexity: 中
      days: 30
      priority: P1
      acceptance: 报送数据与IBOR源数据一致性100%，定时推送准时率>99.9%
      dependency: IBOR全域数据/报表引擎
  - id: G
    name: 数据接入与集成
    functions:
    - id: F01-19
      name: 行情数据接入
      desc: 接入AMD/Bloomberg/Wind实时行情（中债估值/利率曲线/信用利差/波动率曲面），标准化清洗后推送至IBOR定价层
      complexity: 高
      days: 30
      priority: P1
      acceptance: 行情延迟<1s，数据完整性>99.9%，异常行情自动过滤告警
      dependency: AMD行情平台/Bloomberg API/Wind数据接口
    - id: F01-20
      name: 交易数据接入
      desc: 从OMS/交易终端实时获取成交回报（债券/回购/衍生品），含完整交易状态机（报盘/成交/撤单/部分成交）追踪
      complexity: 中
      days: 30
      priority: P1
      acceptance: 成交回报接收延迟<200ms，数据完整性100%，状态机覆盖全交易生命周期
      dependency: ATP报盘引擎/CFETS银行间接口/交易所接口
    - id: F01-21
      name: 持仓数据获取
      desc: 期初从托管行/清算系统获取存量持仓，日间成交驱动增量更新，支持多来源持仓比对与主数据确认
      complexity: 中
      days: 30
      priority: P1
      acceptance: 期初持仓加载完成<7:00AM，日间增量延迟<500ms，多源持仓一致性核验通过率>99%
      dependency: 中登/中债登/托管行SFTP接口/清算结算系统
  - id: H
    name: What-if 投资试算
    functions:
    - id: F01-22
      name: 多时态头寸视图（IBOR数据基础设施，供上层消费）
      desc: "【数据基础设施】基于事件溯源存储，提供任意历史as-of/as-on日期的头寸快照API（历史切片），以及基于已知未来事件（到期/付息/回购续作）的前瞻头寸视图。本模块不做投资分析——绩效复盘由M07调用本API；流动性预判由M07 F07-14调用本API+F01-06现金流；情景分析由M04/M07调用本API叠加市场冲击"
      complexity: 高
      days: 30
      priority: P1
      acceptance: 历史快照查询任意日期延迟<3s，前瞻视图覆盖30日，API并发支持≥20消费方
      dependency: IBOR事件存储引擎/F01-06现金流预测
    - id: F01-23
      name: 会计分类估值配置与稽核
      desc: 按FVTPL（市值法）/FVOCI（可供出售）/AMC（摊余成本法）三类配置逐券估值方法，算法热加载不重启，支持OCI账户再分类触发边界校验（防止调仓意外触发IFRS9分类变更）；估值稽核规则引擎实时校验计算结果合理性。**ABOR差异对比不在此处重复**——由F01-15负责；本函数专注估值方法配置正确性
      complexity: 高
      days: 30
      priority: P1
      acceptance: 估值方法配置覆盖全品种，稽核规则命中率>99%，OCI再分类触发边界零漏检
      dependency: 资产主数据（会计分类标签）/AMD估值数据
    - id: F01-24
      name: 手工补录与审批工作流
      desc: 对上游系统缺失或错误数据支持手工增删改操作，修改后自动触发双级审批工作流，全操作记录审计日志，支持待办集中处理与历史审批检索
      complexity: 中
      days: 20
      priority: P1
      acceptance: 审批流配置覆盖100%手工操作类型，操作日志不可篡改，审批完成后数据生效<1min
      dependency: 权限管理系统/IBOR数据核心层
    - id: F01-25
      name: What-if持仓沙箱（供M07 Shadow Portfolio调用）
      desc: "【IBOR位置引擎层，不做投资分析】接收模拟交易指令（不实际成交），在隔离沙箱中实时计算假设成交后的持仓快照+MtM+P&L，支持≥10方案写时复制(CoW)并行。本模块输出边界：持仓变化+基础损益；风险敏感度/因子暴露/最优路径推荐由M07 F07-05 Shadow Portfolio在本API基础上完成，本模块不重复计算"
      complexity: 高
      days: 35
      priority: P1
      acceptance: 沙箱持仓生效<2s，MtM误差<0.1%，≥10方案并行无数据污染，scenario P&L计算<5s，数据流向M04/M07 <1s，支持≥5种公司行为(split/merge/distribution/rights/spinoff)，支持10+市场冲击场景(yield curve parallel/butterfly/bear/bull, FX moves, spread moves)
      dependency: IBOR实时持仓/M09估值引擎/M06事前风控（沙箱指令同样需合规校验）/M01 F01-29 DQ监控(作为数据质量前置条件)/M04 F04-22(消费sandbox数据做pre-trade impact)/M07 F07-22(消费sandbox结果做P&L分析)
  - id: I
    name: 抵押品管理
    functions:
    - id: F01-28
      name: 抵押品管理（Collateral Management）
      desc: 回购质押券管理：合格性验证（发行人评级/品种/余期限制）、折扣率（Haircut）维护、替换申请工作流；场外衍生品保证金管理：初始保证金（IM，SIMM方法）与变动保证金（VM）每日计算，Margin Call发出/确认/追缴全流程；抵押品库存优化：自动推荐最优抵押品组合（最小化高质量流动性资产占用），支持三方托管接口（中债登）；抵押品头寸与IBOR持仓双向同步，冻结/释放自动联动F01-04可用券管理
      complexity: 高
      days: 40
      priority: P1
      acceptance: Haircut配置覆盖全品种，Margin Call计算与对手方差异<0.5%，抵押品状态与F01-04同步延迟<30s，三方托管接口联通率100%
      dependency: IBOR持仓（F01-01/F01-04）/定价平台M09（抵押品MtM）/交易对手管理/中债登三方托管接口
  - id: J
    name: 数据质量监控与运维
    functions:
    - id: F01-29
      name: 数据质量监控与SLA治理
      desc: 跨层级实时监控IBOR数据质量：staleness监控（行情/估值超过5s老化触发告警），completeness检测（缺失持仓>1%触发告警），continuity检测（Kafka dropped events/consumer lag detection）；Dashboard展示：数据源实时健康度、SLA compliance heatmap（按行情/估值/托管行接口分别追踪），alert路由至duty team；集成至F01-14 reconciliation engine（作为DQ issues前置条件）和M04风险计量平台（signal data freshness问题，防止垃圾数据进入风险计算）；支持Great Expectations + Deequ开源数据质量框架
      complexity: 中
      days: 25
      priority: P1
      acceptance: Staleness detection <10s，completeness check <30s，alert transmission <1min，DQ dashboard real-time刷新<5s，覆盖全部data_model层级(Transaction/Trade/Position/Asset/MarketData/Collateral)，告警路由命中率>99%
      dependency: 所有inbound interfaces（OMS/ATP报盘, AMD行情, 中登/中债登/上清托管, 资金系统划拨）/F01-14 reconciliation/M04 risk platform/内部metrics infrastructure
  tech_design:
    pattern: 实时提取IBOR — 事件驱动架构(EDA)，按需即时生成头寸视图，不使用清除填充或滚动余额模式
    data_model:
    - 'Transaction层: 原始交易/非交易事件全量流水，含完整状态机'
    - 'Trade层: 成交簿记与Trade enrichment（子账户/策略/指令信息补充）'
    - 'Position层: 实时头寸计算、成本核算、多时态快照存储'
    - 'Asset层: 估值定价、风险指标加工、会计分类标注'
    - 'MarketData层: 行情与估值数据实时输入，清洗后分发至定价层'
    - 'Collateral层: 质押券/保证金台账，Margin Call状态机，抵押品优化分配'
    core_stack:
      realtime_engine: Kafka(事件总线) + 自研PHX计算引擎(事件驱动实时计算)
      position_store: Redis Cluster(日内实时缓存，<1ms读写) + TiDB/OceanBase(历史时序，5年快照)
      batch_engine: Airflow(日终调度) + Spark(批量全量估值)
      api_layer: REST/gRPC(同步查询) + Kafka Topic(异步推送给下游系统)
      infra: 双活部署，核心服务99.99% SLA；信创适配RocketMQ/GaussDB可替换
    key_interfaces:
      inbound:
      - OMS/ATP → 成交回报(Kafka实时，<200ms)
      - WIND/Bloomberg → 行情估值(Kafka实时，<1s)
      - 中登/中债登/上清 → 日终持仓(SFTP批量，T+0 EOD)
      - 资金系统 → 现金划拨(REST实时)
      outbound:
      - IBOR → M04风险计量平台（Kafka推送，持仓+估值变化事件；M04叠加市场冲击做情景P&L，IBOR不做）
      - IBOR → M07组合管理（REST查询API + Kafka实时订阅；M07 F07-05调用F01-25沙箱做Shadow Portfolio分析）
      - IBOR → M06事前风控/合规（REST同步，持仓数据供F06-11持续合规监控）
      - IBOR → 报表引擎/监管报送（REST批量拉取）
    key_decisions:
    - '双态部署: 生产态(实时)与模拟态(What-if沙箱)数据隔离，模拟态与生产态T-0同步'
    - '估值算法可插拔: FVTPL/FVOCI/AMC通过配置切换，粒度支持个券维度，算法热加载不重启'
    - '信创优先: 消息队列优先RocketMQ，数据库优先OceanBase/GaussDB，Kafka/TiDB作备选'
    - '多时态头寸: 以Event Sourcing方式存储全量事件，任意时间点头寸按需重建，无需预存快照'
    open_questions:
    - 与现有ABOR会计系统的接口协议待确认（文件/API/CDC）
    - 信创环境下RocketMQ替代Kafka的性能基准测试待完成
    - What-if模拟态与生产态的数据同步延迟SLA待与业务方对齐
